services:
  - type: web
    name: schemaai-studio
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: schemaai-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: https://eshita-chauhan.github.io
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: schemaai-db
    plan: free
    region: oregon
    databaseName: schemaai
